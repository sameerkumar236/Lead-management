services:
  - type: web
    name: leadflow-crm-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTO_SEED_DEMO
        value: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
